name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# 同一分支的新推送取消正在跑的旧 run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # 后端：pytest（agent 单测 + API 集成测试，DeepSeek/ChromaDB 全 mock）
  # ============================================================
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DEEPSEEK_API_KEY: test-key-not-real
      RUN_BACKGROUND_TICK: "0"
      EMBEDDING_PROVIDER: fastembed
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install system deps (for aiortc)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libavdevice-dev libavfilter-dev libopus-dev libvpx-dev libsrtp2-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q

  # ============================================================
  # 前端：type-check + vitest 单测 + Playwright e2e（仅 chromium）
  # ============================================================
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (vue-tsc)
        run: npm run type-check

      - name: Unit tests (vitest)
        run: npx vitest run

      - name: Build (vite build-only，供 Playwright preview 用)
        run: npm run build-only
        env:
          VITE_API_BASE: /api

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e (chromium only)
        run: npx playwright test --project=chromium
